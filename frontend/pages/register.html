<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create account - Coding Contest Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="panel">
      <h1><span class="brand-mark">&gt;</span> Create account</h1>
      <p class="subtitle">Join the group, start competing.</p>

      <div id="alert-box"></div>

      <form id="register-form">
        <div class="field">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required autocomplete="name" />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email" />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required minlength="6" autocomplete="new-password" />
          <p class="field-hint">At least 6 characters.</p>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Create account</button>
      </form>

      <p class="auth-switch">Already have an account? <a href="login.html">Sign in</a></p>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    if (Auth.isLoggedIn()) {
      window.location.href = 'contests.html';
    }

    const form = document.getElementById('register-form');
    const alertBox = document.getElementById('alert-box');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertBox.innerHTML = '';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating account...';

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await Api.register(name, email, password);
        Auth.setSession(res.token, res.user);
        // New registrations are always students (see authController.js -
        // admin promotion happens manually via SQL, by design).
        window.location.href = 'contests.html';
      } catch (err) {
        alertBox.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create account';
      }
    });
  </script>
</body>
</html>
