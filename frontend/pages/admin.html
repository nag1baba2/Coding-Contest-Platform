<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Coding Contest Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <script>(function(){var t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <a href="contests.html" class="brand"><span class="brand-mark">&gt;</span> contest_platform</a>
      <nav class="nav-links">
        <a href="contests.html">Contests</a>
        <a href="admin.html" class="active">Admin</a>
      </nav>
      <div class="user-badge">
        <span class="role-tag admin" id="role-tag">admin</span>
        <span id="user-name"></span>
        <button class="theme-toggle" id="theme-toggle">☾</button>
        <button class="btn btn-secondary btn-sm" id="logout-btn">Sign out</button>
      </div>
    </header>

    <main>
      <div class="page-header flex-between">
        <div>
          <h1>Admin panel</h1>
          <p>Create contests, manage problems, review activity.</p>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-secondary" id="show-users-btn">Users</button>
          <button class="btn btn-primary" id="new-contest-btn">+ New contest</button>
        </div>
      </div>

      <div id="alert-box"></div>

      <!-- Contests section -->
      <div id="contests-section">
        <div id="contest-list" class="contest-grid">
          <p style="color: var(--text-secondary)">Loading contests...</p>
        </div>
      </div>

      <!-- Users section (hidden by default) -->
      <div id="users-section" class="hidden">
        <div class="section-title" style="margin-bottom:var(--space-4);">User points overview</div>
        <div class="panel" style="margin-bottom:var(--space-6);overflow:hidden;">
          <div id="points-bar-graph" class="bar-graph"></div>
        </div>

        <div class="section-title" style="margin-bottom:var(--space-4);">All users</div>
        <div class="panel" style="padding:0;">
          <div class="table-wrap">
            <table id="users-table">
              <thead>
                <tr>
                  <th>Name</th><th>Email</th><th>Role</th>
                  <th>Status</th><th>Total pts</th><th>Actions</th>
                </tr>
              </thead>
              <tbody id="users-tbody">
                <tr><td colspan="6" style="color:var(--text-secondary)">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Generic confirm modal (replaces browser confirm()) -->
  <div class="modal-overlay hidden" id="confirm-modal-overlay">
    <div class="modal" style="max-width:400px;">
      <h2 id="confirm-modal-title">Are you sure?</h2>
      <p class="confirm-modal-message" id="confirm-modal-message"></p>
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" id="confirm-modal-cancel">Cancel</button>
        <button type="button" class="btn btn-danger" id="confirm-modal-confirm">Delete</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay hidden" id="contest-modal-overlay">
    <div class="modal">
      <h2 id="contest-modal-title">New contest</h2>
      <form id="contest-form">
        <input type="hidden" id="contest-form-id" />
        <div class="field">
          <label for="contest-name">Name</label>
          <input type="text" id="contest-name" required />
        </div>
        <div class="field">
          <label for="contest-description">Description (optional)</label>
          <textarea id="contest-description" style="font-family: var(--font-body); min-height: 60px;"></textarea>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="contest-start">Start time</label>
            <input type="datetime-local" id="contest-start" required />
          </div>
          <div class="field">
            <label for="contest-end">End time</label>
            <input type="datetime-local" id="contest-end" required />
          </div>
        </div>
        <div id="contest-form-error"></div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="contest-modal-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary" id="contest-modal-save">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay hidden" id="problems-list-modal-overlay">
    <div class="modal" style="max-width: 600px;">
      <div class="flex-between" style="margin-bottom: 16px;">
        <h2 style="margin-bottom: 0;">Problems</h2>
        <button type="button" class="btn btn-primary btn-sm" id="add-problem-btn">+ Add problem</button>
      </div>
      <div id="problems-list-body"></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" id="problems-list-close">Close</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay hidden" id="question-modal-overlay">
    <div class="modal" style="max-width:560px;">
      <h2 id="question-modal-title">Add problem</h2>
      <form id="question-form">
        <input type="hidden" id="question-form-id" />
        <input type="hidden" id="question-form-contest-id" />
        <div class="field">
          <label for="question-title">Title</label>
          <input type="text" id="question-title" required />
        </div>
        <div class="field">
          <label for="question-description">Description</label>
          <textarea id="question-description" style="font-family: var(--font-body);" required></textarea>
        </div>
        <div class="field">
          <label for="question-input">Input / Example (optional, shown to students)</label>
          <textarea id="question-input"></textarea>
        </div>
        <div class="field">
          <label for="question-language">Question type</label>
          <select id="question-language">
            <option value="text">Text answer</option>
            <option value="python">Python coding</option>
          </select>
        </div>
        <!-- Text-only fields -->
        <div id="text-fields">
          <div class="field">
            <label for="question-expected">Expected output (answer key — never shown to students)</label>
            <textarea id="question-expected"></textarea>
          </div>
        </div>
        <!-- Python-only fields -->
        <div id="python-fields" class="hidden">
          <div class="field">
            <label for="question-func-sig">Function signature <span style="color:var(--text-faint);font-size:12px;">(e.g. <code>twoSum(nums, target)</code>)</span></label>
            <input type="text" id="question-func-sig" placeholder="solution()" />
          </div>
          <div class="field">
            <label>Test cases <span style="color:var(--text-faint);font-size:12px;">(args and expected as JSON values)</span></label>
            <div id="test-cases-container" style="display:flex;flex-direction:column;gap:8px;"></div>
            <button type="button" class="btn btn-secondary btn-sm" id="add-tc-btn" style="margin-top:8px;">+ Add test case</button>
          </div>
        </div>
        <div class="field">
          <label for="question-points">Points</label>
          <input type="number" id="question-points" min="1" value="10" required />
        </div>
        <div id="question-form-error"></div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="question-modal-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary" id="question-modal-save">Add problem</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    Auth.requireAuth({ adminOnly: true });

    const user = Auth.getUser();
    document.getElementById('user-name').textContent = user.name;
    document.getElementById('logout-btn').addEventListener('click', () => {
      Auth.clearSession();
      window.location.href = 'login.html';
    });

    // ── Confirm modal ─────────────────────────────────────────
    let confirmResolve = null;
    const confirmOverlay = document.getElementById('confirm-modal-overlay');

    function showConfirm(title, message, confirmLabel = 'Delete') {
      document.getElementById('confirm-modal-title').textContent = title;
      document.getElementById('confirm-modal-message').textContent = message;
      document.getElementById('confirm-modal-confirm').textContent = confirmLabel;
      confirmOverlay.classList.remove('hidden');
      return new Promise((resolve) => { confirmResolve = resolve; });
    }

    document.getElementById('confirm-modal-cancel').addEventListener('click', () => {
      confirmOverlay.classList.add('hidden');
      if (confirmResolve) { confirmResolve(false); confirmResolve = null; }
    });
    document.getElementById('confirm-modal-confirm').addEventListener('click', () => {
      confirmOverlay.classList.add('hidden');
      if (confirmResolve) { confirmResolve(true); confirmResolve = null; }
    });

    // ── Section toggle ────────────────────────────────────────
    const contestsSection = document.getElementById('contests-section');
    const usersSection = document.getElementById('users-section');
    const showUsersBtn = document.getElementById('show-users-btn');

    showUsersBtn.addEventListener('click', () => {
      const showingUsers = !usersSection.classList.contains('hidden');
      if (showingUsers) {
        usersSection.classList.add('hidden');
        contestsSection.classList.remove('hidden');
        showUsersBtn.textContent = 'Users';
      } else {
        usersSection.classList.remove('hidden');
        contestsSection.classList.add('hidden');
        showUsersBtn.textContent = 'Contests';
        loadUsers();
      }
    });

    const listEl = document.getElementById('contest-list');
    const alertBox = document.getElementById('alert-box');
    let contestsCache = [];

    async function loadContests() {
      try {
        contestsCache = await Api.listContests();

        if (contestsCache.length === 0) {
          listEl.innerHTML = `
            <div class="empty-state">
              <h3>No contests yet</h3>
              <p>Create your first contest to get started.</p>
            </div>
          `;
          return;
        }

        listEl.innerHTML = contestsCache
          .map(
            (c) => `
          <div class="contest-card" data-id="${c.id}">
            <div class="contest-card-top">
              <div>
                <h3>${escapeHtml(c.name)}</h3>
              </div>
              ${statusPillHtml(c.status)}
            </div>
            <div class="meta">
              <span>Starts ${formatDateTime(c.start_time)}</span>
              <span>Ends ${formatDateTime(c.end_time)}</span>
            </div>
            <div class="actions">
              <button class="btn btn-secondary btn-sm manage-questions-btn" data-id="${c.id}">Problems</button>
              <a class="btn btn-secondary btn-sm" href="contest-stats.html?id=${c.id}">Stats</a>
              <button class="btn btn-secondary btn-sm edit-contest-btn" data-id="${c.id}">Edit</button>
              <button class="btn btn-danger btn-sm delete-contest-btn" data-id="${c.id}">Delete</button>
            </div>
          </div>
        `
          )
          .join('');

        wireCardActions();
      } catch (err) {
        showAlert(alertBox, err.message);
      }
    }

    function wireCardActions() {
      listEl.querySelectorAll('.edit-contest-btn').forEach((btn) => {
        btn.addEventListener('click', () => openContestModal(btn.dataset.id));
      });
      listEl.querySelectorAll('.delete-contest-btn').forEach((btn) => {
        btn.addEventListener('click', () => deleteContest(btn.dataset.id));
      });
      listEl.querySelectorAll('.manage-questions-btn').forEach((btn) => {
        btn.addEventListener('click', () => openProblemsListModal(btn.dataset.id));
      });
    }

    async function deleteContest(id) {
      const contest = contestsCache.find((c) => String(c.id) === String(id));
      const confirmed = await showConfirm(
        'Delete contest',
        `Delete "${contest ? contest.name : 'this contest'}"? This also removes all its problems and submissions. This cannot be undone.`
      );
      if (!confirmed) return;

      try {
        await Api.deleteContest(id);
        loadContests();
      } catch (err) {
        showAlert(alertBox, err.message);
      }
    }

    // ── User management ───────────────────────────────────────
    async function loadUsers() {
      const tbody = document.getElementById('users-tbody');
      const graphEl = document.getElementById('points-bar-graph');
      try {
        const users = await Api.listUsers();

        // Bar graph
        const students = users.filter((u) => u.role !== 'admin');
        const maxPts = Math.max(1, ...students.map((u) => Math.max(0, u.total_points)));
        graphEl.innerHTML = students.length === 0
          ? '<p style="color:var(--text-secondary);font-size:13px;">No students yet.</p>'
          : students.map((u) => {
              const pts = u.total_points;
              const heightPct = pts <= 0 ? 0 : Math.round((pts / maxPts) * 120);
              return `
                <div class="bar-graph-col ${pts <= 0 ? 'bar-graph-negative' : ''}">
                  <div class="bar-graph-value">${pts}</div>
                  <div class="bar-graph-bar" style="height:${heightPct}px;" title="${escapeHtml(u.name)}: ${pts} pts"></div>
                  <div class="bar-graph-label">${escapeHtml(u.name)}</div>
                </div>`;
            }).join('');

        // Table
        if (users.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" style="color:var(--text-secondary)">No users found.</td></tr>';
          return;
        }
        tbody.innerHTML = users.map((u) => `
          <tr>
            <td>${escapeHtml(u.name)}</td>
            <td style="color:var(--text-secondary);font-size:13px;">${escapeHtml(u.email)}</td>
            <td><span class="role-tag ${u.role === 'admin' ? 'admin' : ''}">${u.role}</span></td>
            <td><span class="user-status-badge ${u.status}">${u.status}</span></td>
            <td class="score-cell" style="color:${u.total_points < 0 ? 'var(--judge-reject)' : 'var(--judge-accept)'}">${u.total_points}</td>
            <td>
              ${u.role !== 'admin' ? `
                <div style="display:flex;gap:6px;">
                  ${u.status === 'active'
                    ? `<button class="btn btn-secondary btn-sm block-user-btn" data-id="${u.id}">Block</button>`
                    : `<button class="btn btn-secondary btn-sm unblock-user-btn" data-id="${u.id}">Unblock</button>`
                  }
                  <button class="btn btn-danger btn-sm delete-user-btn" data-id="${u.id}" data-name="${escapeHtml(u.name)}">Delete</button>
                </div>` : '<span style="color:var(--text-faint);font-size:12px;">—</span>'}
            </td>
          </tr>`).join('');

        tbody.querySelectorAll('.block-user-btn').forEach((btn) =>
          btn.addEventListener('click', () => handleBlockUser(btn.dataset.id))
        );
        tbody.querySelectorAll('.unblock-user-btn').forEach((btn) =>
          btn.addEventListener('click', () => handleUnblockUser(btn.dataset.id))
        );
        tbody.querySelectorAll('.delete-user-btn').forEach((btn) =>
          btn.addEventListener('click', () => handleDeleteUser(btn.dataset.id, btn.dataset.name))
        );
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="6"><div class="alert alert-error">${escapeHtml(err.message)}</div></td></tr>`;
      }
    }

    async function handleBlockUser(id) {
      const confirmed = await showConfirm('Block user', 'This user will not be able to log in until unblocked.', 'Block');
      if (!confirmed) return;
      try { await Api.blockUser(id); loadUsers(); } catch (err) { showAlert(alertBox, err.message); }
    }

    async function handleUnblockUser(id) {
      try { await Api.unblockUser(id); loadUsers(); } catch (err) { showAlert(alertBox, err.message); }
    }

    async function handleDeleteUser(id, name) {
      const confirmed = await showConfirm(
        'Delete user',
        `Permanently delete "${name}"? All their submissions and registrations will be removed. They can re-register with the same email.`
      );
      if (!confirmed) return;
      try { await Api.deleteUser(id); loadUsers(); } catch (err) { showAlert(alertBox, err.message); }
    }

    const contestModalOverlay = document.getElementById('contest-modal-overlay');
    const contestForm = document.getElementById('contest-form');
    const contestFormError = document.getElementById('contest-form-error');

    // The <input type="datetime-local"> picker always represents
    // whatever the admin types as LOCAL time (no timezone info is
    // attached to the value itself). The backend stores and returns
    // UTC-labeled timestamps (see db.js timezone: 'Z'). These two
    // helpers are the single place that conversion happens, so it's
    // applied consistently on both the way in (create/update) and the
    // way out (pre-filling the edit form) - getting this wrong in only
    // one direction is exactly what caused the 5:30 offset bug.

    // UTC ISO string (from the API) -> local "YYYY-MM-DDTHH:MM" for
    // pre-filling the datetime-local input.
    function isoToLocalInputValue(isoString) {
      const d = new Date(isoString);
      const pad = (n) => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    // Local "YYYY-MM-DDTHH:MM" (from the datetime-local input) -> UTC
    // ISO string to send to the backend. new Date('YYYY-MM-DDTHH:MM')
    // (no timezone suffix) is interpreted by the browser as local time,
    // exactly matching what the admin saw in the picker - so this is
    // the correct, deliberate use of that parsing behavior, not an
    // accident.
    function localInputValueToIso(localValue) {
      return new Date(localValue).toISOString();
    }

    function openContestModal(id = null) {
      contestFormError.innerHTML = '';
      contestForm.reset();
      document.getElementById('contest-form-id').value = id || '';

      if (id) {
        const contest = contestsCache.find((c) => String(c.id) === String(id));
        document.getElementById('contest-modal-title').textContent = 'Edit contest';
        document.getElementById('contest-name').value = contest.name;
        document.getElementById('contest-description').value = contest.description || '';
        document.getElementById('contest-start').value = isoToLocalInputValue(contest.start_time);
        document.getElementById('contest-end').value = isoToLocalInputValue(contest.end_time);
      } else {
        document.getElementById('contest-modal-title').textContent = 'New contest';
      }

      contestModalOverlay.classList.remove('hidden');
    }

    function closeContestModal() {
      contestModalOverlay.classList.add('hidden');
    }

    document.getElementById('new-contest-btn').addEventListener('click', () => openContestModal());
    document.getElementById('contest-modal-cancel').addEventListener('click', closeContestModal);

    contestForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      contestFormError.innerHTML = '';

      const id = document.getElementById('contest-form-id').value;
      const payload = {
        name: document.getElementById('contest-name').value.trim(),
        description: document.getElementById('contest-description').value.trim(),
        start_time: localInputValueToIso(document.getElementById('contest-start').value),
        end_time: localInputValueToIso(document.getElementById('contest-end').value),
      };

      try {
        if (id) {
          await Api.updateContest(id, payload);
        } else {
          await Api.createContest(payload);
        }
        closeContestModal();
        loadContests();
      } catch (err) {
        contestFormError.innerHTML = `<div class="alert alert-error">${escapeHtml(err.message)}</div>`;
      }
    });

    const problemsListOverlay = document.getElementById('problems-list-modal-overlay');
    const problemsListBody = document.getElementById('problems-list-body');
    let currentProblemsContestId = null;
    let problemsCache = [];

    async function openProblemsListModal(contestId) {
      currentProblemsContestId = contestId;
      problemsListBody.innerHTML = '<p style="color: var(--text-secondary)">Loading...</p>';
      problemsListOverlay.classList.remove('hidden');
      await refreshProblemsList();
    }

    async function refreshProblemsList() {
      try {
        problemsCache = await Api.listQuestionsForAdmin(currentProblemsContestId);

        if (problemsCache.length === 0) {
          problemsListBody.innerHTML = '<div class="empty-state"><h3>No problems yet</h3><p>Click "Add problem" to create one.</p></div>';
          return;
        }

        problemsListBody.innerHTML = problemsCache
          .map(
            (q) => `
          <div class="panel" style="margin-bottom: 8px; padding: 12px 16px;">
            <div class="flex-between">
              <div>
                <strong>${escapeHtml(q.title)}</strong>
                <span class="points-badge" style="margin-left: 8px;">${q.points} pts</span>
              </div>
              <div style="display:flex; gap:8px;">
                <button class="btn btn-secondary btn-sm edit-problem-btn" data-id="${q.id}">Edit</button>
                <button class="btn btn-danger btn-sm delete-problem-btn" data-id="${q.id}">Delete</button>
              </div>
            </div>
          </div>
        `
          )
          .join('');

        problemsListBody.querySelectorAll('.edit-problem-btn').forEach((btn) => {
          btn.addEventListener('click', () => openQuestionModal(currentProblemsContestId, btn.dataset.id));
        });
        problemsListBody.querySelectorAll('.delete-problem-btn').forEach((btn) => {
          btn.addEventListener('click', () => deleteProblem(btn.dataset.id));
        });
      } catch (err) {
        problemsListBody.innerHTML = `<div class="alert alert-error">${escapeHtml(err.message)}</div>`;
      }
    }

    async function deleteProblem(questionId) {
      const q = problemsCache.find((p) => String(p.id) === String(questionId));
      const confirmed = await showConfirm(
        'Delete problem',
        `Delete "${q ? q.title : 'this problem'}"? This also removes all submissions for it. This cannot be undone.`
      );
      if (!confirmed) return;

      try {
        await Api.deleteQuestion(questionId);
        refreshProblemsList();
      } catch (err) {
        problemsListBody.innerHTML = `<div class="alert alert-error">${escapeHtml(err.message)}</div>` + problemsListBody.innerHTML;
      }
    }

    document.getElementById('problems-list-close').addEventListener('click', () => {
      problemsListOverlay.classList.add('hidden');
      // Contest cards show problem counts indirectly via stats, not
      // directly - but refresh anyway in case anything else depends on
      // current contest data.
      loadContests();
    });

    document.getElementById('add-problem-btn').addEventListener('click', () => {
      openQuestionModal(currentProblemsContestId, null);
    });

    const questionModalOverlay = document.getElementById('question-modal-overlay');
    const questionForm = document.getElementById('question-form');
    const questionFormError = document.getElementById('question-form-error');
    const langSelect = document.getElementById('question-language');
    const textFields = document.getElementById('text-fields');
    const pythonFields = document.getElementById('python-fields');
    const tcContainer = document.getElementById('test-cases-container');

    // ── Language selector toggle ──
    langSelect.addEventListener('change', () => {
      const isPython = langSelect.value === 'python';
      textFields.classList.toggle('hidden', isPython);
      pythonFields.classList.toggle('hidden', !isPython);
      document.getElementById('question-expected').required = !isPython;
    });

    // ── Test case builder ──
    function renderTestCase(index, argsVal = '', expectedVal = '') {
      const div = document.createElement('div');
      div.className = 'tc-entry';
      div.dataset.index = index;
      div.style.cssText = 'display:grid;grid-template-columns:1fr 1fr auto;gap:6px;align-items:start;background:var(--bg-panel-raised);border:1px solid var(--border-subtle);border-radius:6px;padding:10px 12px;';
      div.innerHTML = `
        <div>
          <div style="font-size:11px;font-weight:600;color:var(--text-faint);margin-bottom:4px;">ARGS (JSON array)</div>
          <input type="text" class="tc-args" placeholder='[nums, target]' value="${escapeHtml(argsVal)}"
            style="width:100%;font-family:var(--font-display);font-size:12px;" />
        </div>
        <div>
          <div style="font-size:11px;font-weight:600;color:var(--text-faint);margin-bottom:4px;">EXPECTED (JSON value)</div>
          <input type="text" class="tc-expected" placeholder='[0, 1]' value="${escapeHtml(expectedVal)}"
            style="width:100%;font-family:var(--font-display);font-size:12px;" />
        </div>
        <button type="button" class="btn btn-danger btn-sm remove-tc-btn" style="margin-top:18px;">✕</button>`;
      div.querySelector('.remove-tc-btn').addEventListener('click', () => {
        div.remove();
        reindexTestCases();
      });
      return div;
    }

    function reindexTestCases() {
      tcContainer.querySelectorAll('.tc-entry').forEach((el, i) => { el.dataset.index = i; });
    }

    function addTestCase(argsVal = '', expectedVal = '') {
      const count = tcContainer.querySelectorAll('.tc-entry').length;
      if (count >= 10) return;
      tcContainer.appendChild(renderTestCase(count, argsVal, expectedVal));
    }

    document.getElementById('add-tc-btn').addEventListener('click', () => addTestCase());

    function getTestCasesFromForm() {
      const entries = tcContainer.querySelectorAll('.tc-entry');
      const cases = [];
      const errors = [];
      entries.forEach((el, i) => {
        const argsRaw = el.querySelector('.tc-args').value.trim();
        const expectedRaw = el.querySelector('.tc-expected').value.trim();
        let args, expected;
        try { args = JSON.parse(argsRaw); } catch { errors.push(`Test case ${i + 1}: Args is not valid JSON`); return; }
        try { expected = JSON.parse(expectedRaw); } catch { errors.push(`Test case ${i + 1}: Expected is not valid JSON`); return; }
        if (!Array.isArray(args)) { errors.push(`Test case ${i + 1}: Args must be a JSON array`); return; }
        cases.push({ args, expected });
      });
      return { cases, errors };
    }

    // ── Open question modal ──
    function openQuestionModal(contestId, questionId = null) {
      questionFormError.innerHTML = '';
      questionForm.reset();
      tcContainer.innerHTML = '';
      langSelect.value = 'text';
      textFields.classList.remove('hidden');
      pythonFields.classList.add('hidden');
      document.getElementById('question-expected').required = true;
      document.getElementById('question-form-contest-id').value = contestId;
      document.getElementById('question-form-id').value = questionId || '';

      if (questionId) {
        const q = problemsCache.find((p) => String(p.id) === String(questionId));
        document.getElementById('question-modal-title').textContent = 'Edit problem';
        document.getElementById('question-modal-save').textContent = 'Save changes';
        document.getElementById('question-title').value = q.title;
        document.getElementById('question-description').value = q.description;
        document.getElementById('question-input').value = q.input_data || '';
        document.getElementById('question-points').value = q.points;

        const lang = q.language || 'text';
        langSelect.value = lang;
        if (lang === 'python') {
          textFields.classList.add('hidden');
          pythonFields.classList.remove('hidden');
          document.getElementById('question-expected').required = false;
          document.getElementById('question-func-sig').value = q.function_signature || '';
          const tcs = q.test_cases
            ? (typeof q.test_cases === 'string' ? JSON.parse(q.test_cases) : q.test_cases)
            : [];
          tcs.forEach((tc) => addTestCase(JSON.stringify(tc.args), JSON.stringify(tc.expected)));
          if (tcs.length === 0) addTestCase();
        } else {
          document.getElementById('question-expected').value = q.expected_output || '';
        }
      } else {
        document.getElementById('question-modal-title').textContent = 'Add problem';
        document.getElementById('question-modal-save').textContent = 'Add problem';
        document.getElementById('question-points').value = 10;
      }

      questionModalOverlay.classList.remove('hidden');
    }

    document.getElementById('question-modal-cancel').addEventListener('click', () => {
      questionModalOverlay.classList.add('hidden');
    });

    questionForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      questionFormError.innerHTML = '';

      const contestId = document.getElementById('question-form-contest-id').value;
      const questionId = document.getElementById('question-form-id').value;
      const lang = langSelect.value;

      const payload = {
        contest_id: Number(contestId),
        title: document.getElementById('question-title').value.trim(),
        description: document.getElementById('question-description').value.trim(),
        input_data: document.getElementById('question-input').value.trim(),
        points: Number(document.getElementById('question-points').value),
        language: lang,
      };

      if (lang === 'python') {
        payload.function_signature = document.getElementById('question-func-sig').value.trim();
        const { cases, errors } = getTestCasesFromForm();
        if (errors.length > 0) {
          questionFormError.innerHTML = `<div class="alert alert-error">${escapeHtml(errors[0])}</div>`;
          return;
        }
        if (cases.length === 0) {
          questionFormError.innerHTML = `<div class="alert alert-error">Add at least one test case.</div>`;
          return;
        }
        payload.test_cases = cases;
      } else {
        payload.expected_output = document.getElementById('question-expected').value.trim();
      }

      try {
        if (questionId) {
          await Api.updateQuestion(questionId, payload);
        } else {
          await Api.createQuestion(payload);
        }
        // Refresh the list BEFORE hiding the modal - otherwise there's
        // a brief window where the modal is gone but the list behind
        // it still shows stale (pre-add/edit) data, which is both a
        // minor UX flash and something E2E tests can race against if
        // they only wait for the modal to disappear.
        await refreshProblemsList();
        questionModalOverlay.classList.add('hidden');
        questionForm.reset();
        tcContainer.innerHTML = '';
      } catch (err) {
        questionFormError.innerHTML = `<div class="alert alert-error">${escapeHtml(err.message)}</div>`;
      }
    });

    loadContests();
  </script>
</body>
</html>
