<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contests - Coding Contest Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <a href="contests.html" class="brand"><span class="brand-mark">&gt;</span> contest_platform</a>
      <nav class="nav-links">
        <a href="contests.html" class="active">Contests</a>
        <a href="#" id="admin-link" class="hidden">Admin</a>
      </nav>
      <div class="user-badge">
        <span class="role-tag" id="role-tag"></span>
        <span id="user-name"></span>
        <button class="btn btn-secondary btn-sm" id="logout-btn">Sign out</button>
      </div>
    </header>

    <main>
      <div class="page-header">
        <h1>Contests</h1>
        <p>Pick a contest, solve problems, climb the leaderboard.</p>
      </div>

      <div id="alert-box"></div>
      <div id="contest-list" class="contest-grid">
        <p style="color: var(--text-secondary)">Loading contests...</p>
      </div>
    </main>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    Auth.requireAuth();

    const user = Auth.getUser();
    document.getElementById('user-name').textContent = user.name;
    const roleTag = document.getElementById('role-tag');
    roleTag.textContent = user.role;
    if (user.role === 'admin') {
      roleTag.classList.add('admin');
      document.getElementById('admin-link').classList.remove('hidden');
      document.getElementById('admin-link').href = 'admin.html';
    }

    document.getElementById('logout-btn').addEventListener('click', () => {
      Auth.clearSession();
      window.location.href = 'login.html';
    });

    const listEl = document.getElementById('contest-list');
    const alertBox = document.getElementById('alert-box');

    async function loadContests() {
      try {
        const [contests, myRegistrations] = await Promise.all([
          Api.listContests(),
          Api.getMyRegistrations(),
        ]);
        const registeredSet = new Set(myRegistrations);

        if (contests.length === 0) {
          listEl.innerHTML = `
            <div class="empty-state">
              <h3>No contests yet</h3>
              <p>Check back soon, or ask an admin to create one.</p>
            </div>`;
          return;
        }

        const order = { active: 0, upcoming: 1, ended: 2 };
        contests.sort((a, b) => order[a.status] - order[b.status]);

        listEl.innerHTML = contests.map((c) => {
          const isRegistered = registeredSet.has(c.id);
          const regBadge = isRegistered ? '<span class="registered-badge">Registered</span>' : '';
          const regBtn = c.status === 'upcoming'
            ? `<button class="btn btn-sm ${isRegistered ? 'btn-secondary' : 'btn-primary'} reg-btn"
                data-id="${c.id}" data-registered="${isRegistered}" style="margin-top:12px;">
                ${isRegistered ? 'Unregister' : 'Register'}
               </button>`
            : '';

          return `
            <div class="contest-card-wrapper">
              <a class="contest-card" href="contest-detail.html?id=${c.id}" style="display:block;text-decoration:none;color:inherit;">
                <div class="contest-card-top">
                  <div style="display:flex;align-items:center;gap:8px;">
                    <h3>${escapeHtml(c.name)}</h3>
                    ${regBadge}
                  </div>
                  ${statusPillHtml(c.status)}
                </div>
                <div class="meta">
                  <span>Starts ${formatDateTime(c.start_time)}</span>
                  <span>Ends ${formatDateTime(c.end_time)}</span>
                  <span>${c.registration_count} registered</span>
                </div>
              </a>
              ${regBtn}
            </div>`;
        }).join('');

        listEl.querySelectorAll('.reg-btn').forEach((btn) => {
          btn.addEventListener('click', async (e) => {
            e.preventDefault();
            const id = btn.dataset.id;
            const registered = btn.dataset.registered === 'true';
            btn.disabled = true;
            try {
              if (registered) {
                await Api.unregisterFromContest(id);
              } else {
                await Api.registerForContest(id);
              }
              loadContests();
            } catch (err) {
              showAlert(alertBox, err.message);
              btn.disabled = false;
            }
          });
        });
      } catch (err) {
        showAlert(alertBox, err.message);
        listEl.innerHTML = '';
      }
    }

    loadContests();
  </script>
</body>
</html>
