<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in - Coding Contest Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="panel">
      <h1><span class="brand-mark">&gt;</span> Sign in</h1>
      <p class="subtitle">Welcome back. Solve, submit, climb the board.</p>

      <div id="alert-box"></div>

      <form id="login-form">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email" />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Sign in</button>
      </form>

      <p class="auth-switch">Don't have an account? <a href="register.html">Create one</a></p>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    // If already logged in, skip straight to the contest list.
    if (Auth.isLoggedIn()) {
      window.location.href = 'contests.html';
    }

    const form = document.getElementById('login-form');
    const alertBox = document.getElementById('alert-box');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertBox.innerHTML = '';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in...';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await Api.login(email, password);
        Auth.setSession(res.token, res.user);
        window.location.href = res.user.role === 'admin' ? 'admin.html' : 'contests.html';
      } catch (err) {
        const msg = err.data && err.data.blocked
          ? 'Your account has been blocked by an administrator. Please contact support.'
          : err.message;
        alertBox.innerHTML = `<div class="alert alert-error">${msg}</div>`;
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
