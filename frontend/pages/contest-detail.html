<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contest - Coding Contest Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <script>(function(){var t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <a href="contests.html" class="brand"><span class="brand-mark">&gt;</span> contest_platform</a>
      <nav class="nav-links">
        <a href="contests.html">Contests</a>
        <a href="#" id="admin-link" class="hidden">Admin</a>
      </nav>
      <div class="user-badge">
        <span class="role-tag" id="role-tag"></span>
        <span id="user-name"></span>
        <button class="theme-toggle" id="theme-toggle">☾</button>
        <button class="btn btn-secondary btn-sm" id="logout-btn">Sign out</button>
      </div>
    </header>

    <main>
      <div id="alert-box"></div>

      <div class="page-header" id="contest-header">
        <p style="color: var(--text-secondary)">Loading contest...</p>
      </div>

      <div class="panel" id="timer-panel" style="margin-bottom: 24px;">
        <div class="timer-block">
          <div class="timer-label">--</div>
          <div class="timer-display">--:--:--</div>
        </div>
      </div>

      <div id="locked-message" class="empty-state hidden">
        <h3 id="locked-title"></h3>
        <p id="locked-detail"></p>
      </div>

      <div id="contest-body" class="hidden">
        <div id="submissions-counter" class="submissions-counter hidden">
          <span>Runs &amp; submissions left</span>
          <span class="counter-value" id="counter-value">—</span>
        </div>
        <div class="section-title">Problems</div>
        <div id="problem-list"></div>

        <!-- Final Submit -->
        <div id="final-submit-section" style="margin-top: 24px; margin-bottom: 24px;">
          <div class="panel" style="display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px 20px;">
            <div>
              <div style="font-weight:600;font-size:14px;">Final Submit</div>
              <div style="color:var(--text-secondary);font-size:13px;margin-top:2px;">
                Lock in your solutions. <strong style="color:var(--judge-reject);">−10 pts penalty</strong> if you haven't submitted anything.
              </div>
            </div>
            <button class="btn btn-primary" id="final-submit-btn">Final Submit</button>
          </div>
          <div id="final-submit-status" class="hidden" style="padding:12px 20px;background:var(--judge-accept-bg);border:1px solid var(--judge-accept);border-radius:8px;margin-top:8px;color:var(--judge-accept);font-size:13px;"></div>
        </div>

        <div class="mt-6 flex-between">
          <div class="section-title" style="margin-bottom: 0;">Leaderboard</div>
          <button class="btn btn-secondary btn-sm" id="refresh-leaderboard-btn">Refresh</button>
        </div>
        <div class="panel">
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>Rank</th><th>Name</th><th>Score</th><th>Last submission</th></tr>
              </thead>
              <tbody id="leaderboard-body">
                <tr><td colspan="4">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    function difficultyBadge(points) {
      if (points <= 10) return '<span class="difficulty-badge easy">Easy</span>';
      if (points <= 20) return '<span class="difficulty-badge medium">Medium</span>';
      return '<span class="difficulty-badge hard">Hard</span>';
    }

    Auth.requireAuth();

    const user = Auth.getUser();
    document.getElementById('user-name').textContent = user.name;
    const roleTag = document.getElementById('role-tag');
    roleTag.textContent = user.role;
    if (user.role === 'admin') {
      roleTag.classList.add('admin');
      document.getElementById('admin-link').classList.remove('hidden');
      document.getElementById('admin-link').href = 'admin.html';
    }
    document.getElementById('logout-btn').addEventListener('click', () => {
      Auth.clearSession();
      window.location.href = 'login.html';
    });

    const params = new URLSearchParams(window.location.search);
    const contestId = params.get('id');
    const alertBox = document.getElementById('alert-box');

    if (!contestId) {
      showAlert(alertBox, 'No contest specified.');
    }

    let stopTimer = null;
    let leaderboardRefreshInterval = null;
    let mySubmissionsByQuestion = {};
    let wrongCountByQuestion = {};

    async function loadMySubmissions() {
      try {
        const subs = await Api.getMySubmissions(contestId);
        mySubmissionsByQuestion = {};
        wrongCountByQuestion = {};
        for (const s of subs) {
          if (!(s.question_id in mySubmissionsByQuestion)) {
            mySubmissionsByQuestion[s.question_id] = s;
          }
          if (!s.is_correct) {
            wrongCountByQuestion[s.question_id] = (wrongCountByQuestion[s.question_id] || 0) + 1;
          }
        }
      } catch {
        mySubmissionsByQuestion = {};
        wrongCountByQuestion = {};
      }
    }

    async function loadSubmissionCounter() {
      try {
        const { remaining, limit } = await Api.getSubmissionLimit(contestId);
        updateCounter(remaining, limit);
      } catch { /* non-fatal */ }
    }

    function updateCounter(remaining, limit) {
      const counterEl = document.getElementById('submissions-counter');
      const valueEl = document.getElementById('counter-value');
      counterEl.classList.remove('hidden');
      valueEl.textContent = `${remaining} / ${limit}`;
      counterEl.classList.toggle('low', remaining <= Math.max(1, Math.floor(limit * 0.2)));
    }

    async function loadProblems() {
      const listEl = document.getElementById('problem-list');
      try {
        const questions = await Api.listQuestionsForStudent(contestId);
        await loadMySubmissions();

        if (questions.length === 0) {
          listEl.innerHTML = '<div class="empty-state"><h3>No problems yet</h3><p>The admin hasn\'t added any problems to this contest.</p></div>';
          return;
        }

        listEl.innerHTML = questions.map((q) => {
          const lastSub = mySubmissionsByQuestion[q.id];
          const wrongCount = wrongCountByQuestion[q.id] || 0;
          const earnedPts = lastSub && lastSub.is_correct ? Math.max(0, q.points - wrongCount) : 0;
          const statusHtml = lastSub
            ? `<span class="status-pill ${lastSub.is_correct ? 'correct' : 'incorrect'}">${lastSub.is_correct ? 'Accepted' : 'Wrong Answer'}</span>`
            : '';
          const scoreHtml = lastSub
            ? `<span style="font-family:var(--font-display);font-size:12px;color:${lastSub.is_correct ? 'var(--judge-accept)' : 'var(--judge-reject)'};">${earnedPts} / ${q.points} pts</span>`
            : '';

          if (q.language === 'python') {
            // Python questions → link to coding page
            return `
            <div class="panel problem-panel" data-question-id="${q.id}" style="display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px 20px;">
              <div style="flex:1;min-width:0;">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
                  <h3 style="font-size:15px;">${escapeHtml(q.title)}</h3>
                  <span class="lang-tag-python">Python</span>
                </div>
                <p style="color:var(--text-secondary);font-size:13px;margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(q.description)}</p>
              </div>
              <div style="display:flex;gap:8px;align-items:center;flex-shrink:0;">
                ${statusHtml}
                ${scoreHtml}
                ${difficultyBadge(q.points)}
                <span class="points-badge">${q.points} pts</span>
                <a class="btn btn-primary btn-sm" href="coding.html?contest=${contestId}&question=${q.id}">Solve →</a>
              </div>
            </div>`;
          }

          // Text answer questions (existing inline form)
          return `
          <div class="panel problem-panel" data-question-id="${q.id}">
            <div class="problem-header">
              <h3 style="user-select:none;">${escapeHtml(q.title)}</h3>
              <div style="display:flex; gap:8px; align-items:center;">
                ${statusHtml}
                ${scoreHtml}
                ${difficultyBadge(q.points)}
                <span class="points-badge">${q.points} pts</span>
              </div>
            </div>
            <p style="color:var(--text-secondary);margin-bottom:12px;user-select:none;">${escapeHtml(q.description)}</p>
            ${q.input_data
              ? `<div class="problem-section"><div class="label">Input</div><div class="code-block" style="user-select:none;">${escapeHtml(q.input_data)}</div></div>`
              : ''}
            ${wrongCount > 0 ? `<p style="font-size:12px;color:var(--judge-reject);margin-bottom:8px;">⚠ ${wrongCount} wrong attempt${wrongCount > 1 ? 's' : ''} (−${wrongCount} pts penalty)</p>` : ''}
            <div class="submit-row">
              <input
                type="text"
                placeholder="Your answer, e.g. [0,1]"
                class="submit-input"
                value="${lastSub ? escapeHtml(lastSub.submitted_answer) : ''}"
              />
              <button class="btn btn-primary submit-btn">Submit</button>
            </div>
            <div class="submit-result" style="margin-top: 8px;"></div>
          </div>`;
        }).join('');

        // Wire up text-question submit buttons
        listEl.querySelectorAll('.problem-panel').forEach((panel) => {
          const questionId = panel.dataset.questionId;
          const btn = panel.querySelector('.submit-btn');
          if (!btn) return;
          const input = panel.querySelector('.submit-input');
          const resultEl = panel.querySelector('.submit-result');

          btn.addEventListener('click', async () => {
            const answer = input.value;
            if (!answer.trim()) return;
            btn.disabled = true;
            btn.textContent = 'Submitting...';
            resultEl.innerHTML = '';

            try {
              const res = await Api.submitAnswer(contestId, questionId, answer);
              const pillClass = res.is_correct ? 'correct' : 'incorrect';
              const pillLabel = res.is_correct ? 'Accepted' : 'Wrong Answer';
              resultEl.innerHTML = `<span class="status-pill ${pillClass}">${pillLabel}</span> <span style="color: var(--text-secondary); font-size: 13px;">${res.points_awarded} pts awarded</span>`;
              loadSubmissionCounter();

              const headerPill = panel.querySelector('.problem-header .status-pill');
              const newPillHtml = `<span class="status-pill ${pillClass}">${pillLabel}</span>`;
              if (headerPill) {
                headerPill.outerHTML = newPillHtml;
              } else {
                panel.querySelector('.problem-header > div').insertAdjacentHTML('afterbegin', newPillHtml);
              }
              loadLeaderboard();
            } catch (err) {
              resultEl.innerHTML = `<span style="color: var(--judge-reject); font-size: 13px;">${escapeHtml(err.message)}</span>`;
            } finally {
              btn.disabled = false;
              btn.textContent = 'Submit';
            }
          });
        });
      } catch (err) {
        if (err.status !== 403) {
          showAlert(alertBox, err.message);
        }
      }
    }

    async function loadLeaderboard() {
      const tbody = document.getElementById('leaderboard-body');
      try {
        const rows = await Api.getLeaderboard(contestId);
        if (rows.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" style="color: var(--text-secondary)">No submissions yet.</td></tr>';
          return;
        }
        const medalClass = (rank) => (rank === 1 ? 'gold' : rank === 2 ? 'silver' : rank === 3 ? 'bronze' : '');
        tbody.innerHTML = rows.map((r) => `
          <tr class="${r.student_id === user.id ? 'leaderboard-own-row' : ''}">
            <td class="rank-cell ${medalClass(r.rank)}">#${r.rank}</td>
            <td>${escapeHtml(r.student_name)}${r.student_id === user.id ? ' <span style="color:var(--accent-blue);font-size:12px;">(you)</span>' : ''}</td>
            <td class="score-cell">${r.total_score}</td>
            <td style="color: var(--text-secondary); font-size: 13px;">${r.last_submission_time ? formatDateTime(r.last_submission_time) : '-'}</td>
          </tr>`).join('');
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="4" style="color: var(--judge-reject)">${escapeHtml(err.message)}</td></tr>`;
      }
    }

    // ── Final Submit ──
    async function setupFinalSubmit(regStatus) {
      const btn = document.getElementById('final-submit-btn');
      const statusEl = document.getElementById('final-submit-status');

      if (regStatus.final_submitted) {
        btn.disabled = true;
        btn.textContent = 'Submitted ✓';
        btn.classList.replace('btn-primary', 'btn-secondary');
        statusEl.classList.remove('hidden');
        statusEl.textContent = `Final submitted at ${formatDateTime(regStatus.final_submitted_at)}`;
        return;
      }

      btn.addEventListener('click', async () => {
        const confirmed = window.confirm('Final submit your contest? This is irreversible. If you have made no submissions you will receive a −10 point penalty.');
        if (!confirmed) return;

        btn.disabled = true;
        btn.textContent = 'Submitting...';
        try {
          const res = await Api.finalSubmit(contestId);
          btn.textContent = 'Submitted ✓';
          btn.classList.replace('btn-primary', 'btn-secondary');
          statusEl.classList.remove('hidden');
          statusEl.textContent = res.penalty_applied
            ? 'Final submitted. −10 pt penalty applied (no submissions made).'
            : 'Final submitted successfully. Good luck!';
        } catch (err) {
          btn.disabled = false;
          btn.textContent = 'Final Submit';
          showAlert(alertBox, err.message);
        }
      });
    }

    function renderLockedState(status, contest) {
      const lockedEl = document.getElementById('locked-message');
      const bodyEl = document.getElementById('contest-body');
      const title = document.getElementById('locked-title');
      const detail = document.getElementById('locked-detail');

      if (status === 'active') {
        lockedEl.classList.add('hidden');
        bodyEl.classList.remove('hidden');
        loadProblems();
        loadLeaderboard();
        loadSubmissionCounter();
        if (!leaderboardRefreshInterval) {
          leaderboardRefreshInterval = setInterval(loadLeaderboard, 30000);
        }
        return;
      }

      if (leaderboardRefreshInterval) {
        clearInterval(leaderboardRefreshInterval);
        leaderboardRefreshInterval = null;
      }

      document.getElementById('submissions-counter').classList.add('hidden');
      document.getElementById('final-submit-section').classList.add('hidden');
      bodyEl.classList.add('hidden');
      lockedEl.classList.remove('hidden');

      if (status === 'upcoming') {
        title.textContent = "This contest hasn't started yet";
        detail.textContent = `Problems unlock at ${formatDateTime(contest.start_time)}. Make sure you register before it starts.`;
      } else {
        title.textContent = 'This contest has ended';
        detail.textContent = 'Submissions are closed. You can still view the leaderboard below.';
        bodyEl.classList.remove('hidden');
        document.getElementById('problem-list').innerHTML = '';
        document.getElementById('final-submit-section').classList.add('hidden');
        loadLeaderboard();
      }
    }

    async function init() {
      try {
        const [contest, regStatus] = await Promise.all([
          Api.getContest(contestId),
          Api.getRegistrationStatus(contestId),
        ]);

        document.getElementById('contest-header').innerHTML = `
          <h1>${escapeHtml(contest.name)}</h1>
          ${contest.description ? `<p>${escapeHtml(contest.description)}</p>` : ''}
          <p style="font-size:13px;color:var(--text-secondary);margin-top:4px;">
            ${contest.registration_count} registered
          </p>
        `;

        if (contest.status === 'upcoming' && !regStatus.registered) {
          document.getElementById('locked-message').classList.remove('hidden');
          document.getElementById('locked-title').textContent = "You're not registered for this contest";
          document.getElementById('locked-detail').textContent =
            `Register before ${formatDateTime(contest.start_time)} to participate.`;
          document.getElementById('timer-panel').classList.add('hidden');
        }

        if (contest.status === 'active' && !regStatus.registered) {
          document.getElementById('locked-message').classList.remove('hidden');
          document.getElementById('locked-title').textContent = 'Registration closed';
          document.getElementById('locked-detail').textContent =
            'You did not register before this contest started and cannot participate.';
          document.getElementById('timer-panel').classList.add('hidden');
          return;
        }

        // Setup Final Submit if registered and contest active
        if (regStatus.registered) {
          setupFinalSubmit(regStatus);
        }

        const timerPanel = document.getElementById('timer-panel');
        stopTimer = startCountdown(timerPanel, contest.start_time, contest.end_time, (status) => {
          renderLockedState(status, contest);
        });

        document.getElementById('refresh-leaderboard-btn').addEventListener('click', loadLeaderboard);
      } catch (err) {
        showAlert(alertBox, err.message);
      }
    }

    init();

    window.addEventListener('beforeunload', () => {
      if (stopTimer) stopTimer();
      if (leaderboardRefreshInterval) clearInterval(leaderboardRefreshInterval);
    });
  </script>

  <style>
    .lang-tag-python {
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: #dbeafe;
      color: #1e40af;
      padding: 2px 6px;
      border-radius: 4px;
    }
    [data-theme="dark"] .lang-tag-python {
      background: #1e3a5f;
      color: #93c5fd;
    }
  </style>
</body>
</html>
