name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_test_password
          MYSQL_DATABASE: contest_platform_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend

    env:
      DB_HOST: 127.0.0.1
      DB_USER: root
      DB_PASSWORD: root_test_password
      DB_NAME: contest_platform
      JWT_SECRET: ci_test_secret_not_for_production
      JWT_EXPIRES_IN: 24h

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Load test database schema
        run: mysql -h 127.0.0.1 -u root -proot_test_password contest_platform_test < src/config/schema.test.sql

      - name: Run full test suite (unit + integration)
        run: npm test

  e2e:
    runs-on: ubuntu-latest
    needs: test

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_test_password
          MYSQL_DATABASE: contest_platform
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_HOST: 127.0.0.1
      DB_USER: root
      DB_PASSWORD: root_test_password
      DB_NAME: contest_platform
      JWT_SECRET: ci_test_secret_not_for_production
      JWT_EXPIRES_IN: 24h

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Load backend database schema
        run: mysql -h 127.0.0.1 -u root -proot_test_password contest_platform < backend/src/config/schema.sql

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Start backend server in the background
        working-directory: backend
        run: nohup npm start &

      - name: Wait for backend to become healthy
        run: |
          for i in {1..20}; do
            if curl -s http://localhost:5000/health | grep -q ok; then
              echo "Backend is up"
              exit 0
            fi
            echo "Waiting for backend... ($i/20)"
            sleep 2
          done
          echo "Backend never became healthy"
          exit 1

      - name: Serve frontend in the background
        working-directory: frontend
        run: nohup python3 -m http.server 8080 &

      - name: Wait for frontend to become reachable
        run: |
          for i in {1..15}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/pages/login.html | grep -q 200; then
              echo "Frontend is up"
              exit 0
            fi
            echo "Waiting for frontend... ($i/15)"
            sleep 1
          done
          echo "Frontend never became reachable"
          exit 1

      - name: Install E2E dependencies
        working-directory: e2e
        run: npm install

      - name: Verify Chrome and chromedriver versions match
        working-directory: e2e
        run: |
          google-chrome --version || true
          npx chromedriver --version || true

      - name: Run E2E suite (headless)
        working-directory: e2e
        run: npm test
        env:
          HEADLESS: 'true'
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASSWORD: root_test_password
          DB_NAME: contest_platform